# =============================================================================
# Spring Boot MCP Server – Application Properties
# =============================================================================

# ---- Application ----
spring.application.name=spring-mcp-server

# Suppress the Spring Boot banner – stdout must contain ONLY MCP JSON
spring.main.banner-mode=off

# MCP communicates over STDIO – no HTTP server needed
spring.main.web-application-type=none

# ---- H2 In-Memory Database ----
spring.datasource.url=jdbc:h2:mem:employeedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- H2 Console (dev only) ----
spring.h2.console.enabled=false

# ---- JPA / Hibernate ----
# create-drop: DDL created on startup, dropped on shutdown – safe for in-memory
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Run data.sql after Hibernate has created the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ---- Jackson ----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ---- Logging ----
# CRITICAL: Spring Boot startup banner and framework log output must NOT go
# to stdout because Claude Desktop treats everything on stdout as MCP JSON.
# All log output is redirected to a rolling file (see logback-spring.xml).
logging.config=classpath:logback-spring.xml
